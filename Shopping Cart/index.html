<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0066ff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1723",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<title>Aura - Shopping Cart</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col">
<!-- Main Content Background (Simulated) -->
<div class="flex-1 opacity-40 pointer-events-none p-4 md:p-10">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-6 mb-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">bolt</span>
<h1 class="text-2xl font-bold tracking-tight">Aura</h1>
</div>
</header>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-64 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-64 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-64 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
</div>
<!-- Overlay Background -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40"></div>
<!-- Slide-out Cart Panel -->
<div class="fixed inset-y-0 right-0 z-50 w-full max-w-md bg-white dark:bg-slate-900 shadow-2xl flex flex-col border-l border-slate-200 dark:border-slate-800">
<!-- Cart Header -->
<div class="flex items-center justify-between px-6 py-6 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">shopping_bag</span>
<h2 class="text-xl font-bold">Your Cart</h2>
<span class="bg-primary/10 text-primary text-xs font-bold px-2 py-0.5 rounded-full">2</span>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Cart Items List -->
<div class="flex-1 overflow-y-auto px-6 py-4 space-y-6">
<!-- Item 1 -->
<div class="flex gap-4">
<div class="size-24 shrink-0 overflow-hidden rounded-xl border border-slate-100 dark:border-slate-800">
<img alt="Red Aura Runner Sneaker" class="h-full w-full object-cover" data-alt="Side view of a red high-performance running shoe" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSHBF_btpH0rMq0Ei-xWC9rTix5ZXVhL0t8YJDM3ZMjIP_a1lHSPAkDYR3TxZJDncpuKt4WLiW6SQtHn2cRsXgyn5Cc_7OBYCGPMz58niYcaSNqd0F5776RmnEMdMQt-Z-tawjsSXcyrL1VjG8n3PvK_WhBm1ish9yt-HJMJ7eYz62nGWXq4VZyiCxL0aTO487AbdJeOVLXMwI2nOBX6gSd-ym3YZwDGBittnj1GJagljaFmJtBNjXj7j2U8eTcl-t6Ih1FMssNP1N"/>
</div>
<div class="flex flex-col justify-between flex-1 py-1">
<div>
<div class="flex justify-between">
<h3 class="font-semibold text-slate-900 dark:text-slate-100">Aura Runner X1</h3>
<p class="font-bold text-slate-900 dark:text-slate-100">$120.00</p>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400">Crimson / Size 10</p>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
<button class="px-2 py-1 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="px-3 py-1 text-sm font-medium border-x border-slate-200 dark:border-slate-700">1</span>
<button class="px-2 py-1 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
<button class="text-xs font-medium text-slate-400 hover:text-red-500 transition-colors uppercase tracking-wider">Remove</button>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-4">
<div class="size-24 shrink-0 overflow-hidden rounded-xl border border-slate-100 dark:border-slate-800">
<img alt="White Aura Glide Pro Sneaker" class="h-full w-full object-cover" data-alt="Modern white and pastel lifestyle sneaker" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCttPREIy2sFmWOutwjlK_NrjPQVllktgP3XaNlYy4MKSc5n62_ptWxiyA5vMkVLQSQAKP5SSJu1-Z2yNIRuxgukbBh7VF85kV2hYCBcN5smX5twJTXx4BwJPn-TIqAh3UAHYk81-QxZE_gyCeqmrf7kM1KNykX2LmfFkAd_kk21z_3dbAEzdmMERQUM5Lw9F802jyVjmwWsiO1uCRte6mUdLFj95oD1JeR1hLqHyiswd6aCpFO00ajgewMB0dC1NlyOY8F4jmkNZfg"/>
</div>
<div class="flex flex-col justify-between flex-1 py-1">
<div>
<div class="flex justify-between">
<h3 class="font-semibold text-slate-900 dark:text-slate-100">Aura Glide Pro</h3>
<p class="font-bold text-slate-900 dark:text-slate-100">$145.00</p>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400">Cloud White / Size 9.5</p>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
<button class="px-2 py-1 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
<span class="px-3 py-1 text-sm font-medium border-x border-slate-200 dark:border-slate-700">1</span>
<button class="px-2 py-1 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
<span class="material-symbols-outlined text-sm">add</span>
</button>
</div>
<button class="text-xs font-medium text-slate-400 hover:text-red-500 transition-colors uppercase tracking-wider">Remove</button>
</div>
</div>
</div>
</div>
<!-- Cart Footer -->
<div class="border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/20 px-6 py-6 space-y-4">
<div class="space-y-2">
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Subtotal</span>
<span class="font-medium">$265.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-slate-500 dark:text-slate-400">Shipping</span>
<span class="text-emerald-500 font-medium">Free</span>
</div>
<div class="flex justify-between text-lg font-bold border-t border-slate-200 dark:border-slate-700 pt-2 mt-2">
<span>Total</span>
<span>$265.00</span>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2 group">
<span>Checkout Now</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Trust Signals -->
<div class="grid grid-cols-2 gap-4 pt-4">
<div class="flex items-center gap-2 text-[10px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">
<span class="material-symbols-outlined text-primary text-lg">verified_user</span>
<span>Money-back guarantee</span>
</div>
<div class="flex items-center gap-2 text-[10px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">
<span class="material-symbols-outlined text-primary text-lg">local_shipping</span>
<span>Secure Express Delivery</span>
</div>
</div>
</div>
</div>
</div>
</body></html>
